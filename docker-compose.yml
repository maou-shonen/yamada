# 開發用 Docker Compose — 非正式部署
#
# 前置準備：
#   1. 在 .env 設定 TS_AUTHKEY（Tailscale → Settings → Keys → Generate auth key）
#   2. 確認 tailnet 已啟用 Funnel（Tailscale Admin → DNS → Enable HTTPS + Funnel）
#   3. LINE Webhook URL 設為 https://<hostname>.<tailnet>.ts.net/webhook/line
#
# 使用方式：
#   docker compose up          # 啟動（雙平台）
#   docker compose up -d       # 背景執行
#   docker compose logs -f     # 追蹤日誌

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: yamada-dev
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./.tailscale/serve.json:/config/serve.json:ro
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  yamada:
    image: oven/bun:1
    working_dir: /app
    command: bun run --watch src/index.ts
    env_file: .env
    network_mode: service:tailscale
    depends_on:
      - tailscale
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  tailscale-state:
